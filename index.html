    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* 🔮 기본 컨셉 및 배경 디자인 */
        :root {
            --deep-purple: #0a0014;
            --tarot-purple: #1a0b2e;
            --gold: #f2c94c;
            --gold-dark: #b38f2d;
            --white-ivory: #fdfaf1;
            --mystical-blue: #5c9eff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 화려한 보라색, 검정색 그라데이션 배경 */
            background: linear-gradient(135deg, #000000 0%, #1a0b2e 40%, #3d1b63 100%);
            background-attachment: fixed;
            color: var(--white-ivory);
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        /* 우주/먼지 같은 마법적 효과를 주기 위한 오버레이 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        .main-wrapper {
            max-width: 600px;
            width: 100%;
            padding: 30px 15px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            color: var(--gold);
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 0 0 25px rgba(242, 201, 76, 0.8), 0 0 50px rgba(139, 92, 246, 0.9);
        }

        header p {
            font-size: 15px;
            color: rgba(253, 250, 241, 0.8);
            margin-top: 10px;
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* 🌙 선택 옵션 가로 스크롤 레이아웃 */
        .filter-section {
            margin-bottom: 24px;
        }

        .filter-label {
            font-size: 15px;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        .tarot-chip {
            flex-shrink: 0;
            background: rgba(20, 10, 40, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(242, 201, 76, 0.4);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(253, 250, 241, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tarot-chip.active {
            background: linear-gradient(135deg, var(--gold), #d4af37);
            color: #110022;
            font-weight: 700;
            border-color: var(--gold);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(242, 201, 76, 0.6);
        }

        /* ⚖️ 정렬 필터 */
        .sort-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 30px;
        }

        .sort-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(253, 250, 241, 0.2);
            color: rgba(253, 250, 241, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .sort-btn.active {
            border-color: var(--mystical-blue);
            color: var(--mystical-blue);
            background: rgba(92, 158, 255, 0.15);
            box-shadow: 0 0 15px rgba(92, 158, 255, 0.4);
        }

        /* 🔮 버튼 애니메이션 */
        .reveal-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f2c94c, #b38f2d);
            border: none;
            border-radius: 15px;
            color: #110022;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 5px 25px rgba(242, 201, 76, 0.6);
            font-family: 'Noto Serif KR', serif;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .reveal-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(242, 201, 76, 0.3);
        }

        /* 🃏 결과 타로 카드 */
        .result-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .tarot-card {
            background: linear-gradient(145deg, #2a1645, #110522);
            border: 2px solid var(--gold-dark);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 25px rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tarot-card:active {
            transform: scale(0.98);
        }

        /* 카드 내부 클래식 데코라인 */
        .tarot-card::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(242, 201, 76, 0.25);
            pointer-events: none;
            border-radius: 12px;
        }

        .card-rank {
            position: absolute;
            top: 18px;
            left: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--gold);
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 12px;
        }

        .restaurant-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--white-ivory);
            margin-bottom: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .restaurant-menu {
            font-size: 15px;
            color: #d1c4e9;
            margin-bottom: 8px;
        }

        .restaurant-rating {
            color: var(--gold);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 13.5px;
            color: rgba(253, 250, 241, 0.95);
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(242, 201, 76, 0.15);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-item i {
            color: var(--gold);
            width: 16px;
            text-align: center;
        }

        .card-footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(242, 201, 76, 0.15);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(242, 201, 76, 0.4);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .empty-msg {
            text-align: center;
            color: rgba(253, 250, 241, 0.6);
            padding: 60px 20px;
            font-style: italic;
            font-size: 15px;
            line-height: 1.6;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 1px dashed rgba(253, 250, 241, 0.3);
        }
    </style>
</head>

    <div class="result-container" id="result-area"></div>
</div>

    // 상태 관리 필터 객체
    let currentFilters = {
        purpose: 'all',
        category: 'all',
        people: 'all',
        price: 'all',
        sort: 'rating'
    };

    // 가로 스크롤 해시태그 칩 선택 이벤트 바인딩
    function initFilters() {
        const sections = ['purpose', 'category', 'people', 'price'];
        sections.forEach(sec => {
            const container = document.getElementById(`${sec}-scroll`);
            if(!container) return;
            
            container.querySelectorAll('.tarot-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    container.querySelectorAll('.tarot-chip').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentFilters[sec] = this.dataset.val;
                });
            });
        });

        // 정렬 탭 버튼 이벤트 바인딩
        document.querySelectorAll('.sort-section .sort-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sort-section .sort-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilters.sort = this.dataset.sort;
                revealFortune(); // 정렬 기준 변경 시 리스트 즉시 리렌더링
            });
        });
    }

    function revealFortune() {
        let filtered = rawData.filter(r => {
            // 1. 방문 목적 필터링
            if(currentFilters.purpose !== 'all' && !r.purpose.includes(currentFilters.purpose)) return false;
            
            // 2. 카테고리 필터링
            if(currentFilters.category !== 'all' && r.category !== currentFilters.category) return false;
            
            // 3. 인원수 수용 가능성 필터링 (최대 수용인원 기준)
            if(currentFilters.people !== 'all') {
                const maxCap = r.capacity;
                if(currentFilters.people === '1-2' && maxCap < 2) return false;
                if(currentFilters.people === '2-3' && maxCap < 3) return false;
                if(currentFilters.people === '3-4' && maxCap < 4) return false;
                if(currentFilters.people === '5-6' && maxCap < 6) return false;
                if(currentFilters.people === '6over' && maxCap < 6) return false;
            }
            
            // 4. 가격대 필터링
            if(currentFilters.price !== 'all') {
                const p = r.price;
                if(currentFilters.price === 'under7' && p >= 7000) return false;
                if(currentFilters.price === '7to10' && (p < 7000 || p > 10000)) return false;
                if(currentFilters.price === '10to13' && (p <= 10000 || p > 13000)) return false;
                if(currentFilters.price === '13to16' && (p <= 13000 || p > 16000)) return false;
                if(currentFilters.price === 'over16' && p <= 16000) return false;
            }
            return true;
        });

        // 정렬 로직 적용
        filtered.sort((a, b) => {
            if(currentFilters.sort === 'rating') return b.rating - a.rating; // 평점 높은순
            if(currentFilters.sort === 'distance') return a.distance - b.distance; // 거리 짧은순
            if(currentFilters.sort === 'waiting') return a.waiting - b.waiting; // 웨이팅 적은순
            return 0;
        });

        renderCards(filtered.slice(0, 25)); // 상위 25개 렌더링
    }

    function renderCards(data) {
        const area = document.getElementById('result-area');
        area.innerHTML = '';

        if(data.length === 0) {
            area.innerHTML = `<div class="empty-msg">🔮 운명의 점괘에 어긋나는 식당이 없습니다.<br>선택하신 해시태그 조건을 조금만 풀어보세요!</div>`;
            return;
        }

        data.forEach((r, idx) => {
            const card = document.createElement('div');
            card.className = 'tarot-card';
            
            // 카드 클릭 이벤트 추가: 네이버 지도로 이름 연동 검색
            card.onclick = () => {
                window.open(`https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`, '_blank');
            };
            
            // 순위 왕관/숫자 데코레이션
            let rankDecor = `${idx + 1}`;
            if(idx === 0) rankDecor = "👑 1";
            else if(idx === 1) rankDecor = "✨ 2";
            else if(idx === 2) rankDecor = "🌙 3";

            // 맵기 표시 아이콘 생성
            let spicyIcons = '';
            if(r.spicy > 0) {
                spicyIcons = '🔥'.repeat(r.spicy);
            }

            card.innerHTML = `
                <div class="card-rank">${rankDecor}</div>
                <div class="card-header">
                    <div class="restaurant-name">${r.name}</div>
                    <div class="restaurant-menu">[대표메뉴] ${r.menu} ${spicyIcons}</div>
                    <div class="restaurant-rating">★ ${r.rating.toFixed(1)}</div>
                </div>
                <div class="card-details">
                    <div class="detail-item"><i class="fa-solid fa-coins"></i> 1인 ${r.price.toLocaleString()}원</div>
                    <div class="detail-item"><i class="fa-solid fa-location-dot"></i> 거리 ${r.distance}m</div>
                    <div class="detail-item"><i class="fa-solid fa-hourglass-start"></i> 대기 ${r.waiting}분</div>
                    <div class="detail-item"><i class="fa-solid fa-users"></i> 최대 ${r.capacity}명 수용</div>
                </div>
                <div class="card-footer">
                    <span class="tag">${r.category}</span>
                    ${r.purpose.map(p => `<span class="tag">#${p}</span>`).join('')}
                </div>
            `;
            area.appendChild(card);
        });
    }

    // 돔 로드 완료 시 실행
    window.onload = () => {
        initFilters();
        revealFortune(); // 초기 진입 시 전체 목록 기반 자동 정렬 노출
    };
</script>
