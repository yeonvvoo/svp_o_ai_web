<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#140b24">
<title>점심운세 — 필승상사 점심 추천</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#140b24;           /* 깊은 밤 보라 */
  --velvet-1:#1e1035;      /* 벨벳 상단 */
  --velvet-2:#2a1747;      /* 벨벳 하단 */
  --glow:#8b5cf6;          /* 미스틱 퍼플 글로우 */
  --gold:#d4af37;          /* 금박 */
  --gold-hi:#f5d76e;       /* 금박 하이라이트 */
  --gold-dim:#8a6d1f;      /* 금박 그림자 */
  --parchment:#f3e9d2;     /* 양피지 */
  --parchment-2:#e8d9b8;
  --lavender:#b9a3e3;      /* 보조 텍스트 */
  --text:#f4effc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(139,92,246,.28), transparent 60%),
    linear-gradient(180deg, var(--velvet-1), var(--ink) 55%, var(--velvet-2));
  background-attachment:fixed;
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
}
/* ── 별밤 배경 ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.stars i{position:absolute;color:var(--gold-hi);font-style:normal;opacity:.5;animation:tw 3.4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15;transform:scale(.85)}50%{opacity:.7;transform:scale(1.1)}}

.app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100dvh;
  display:flex;flex-direction:column;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}

.screen{display:none;flex:1;flex-direction:column}
.screen.on{display:flex;animation:fadein .45s ease}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── 공용 타이포 ── */
.eyebrow{font-size:12px;letter-spacing:.35em;color:var(--gold);text-align:center;text-transform:uppercase}
.serif{font-family:'Noto Serif KR',serif}
.divider{display:flex;align-items:center;gap:10px;color:var(--gold-dim);margin:14px 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}

/* ══ 1. 인트로 ══ */
#intro{justify-content:center;text-align:center;gap:0}
.moon{font-size:44px;margin-bottom:18px;filter:drop-shadow(0 0 18px rgba(245,215,110,.55));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#intro .eyebrow{margin-bottom:14px}
.title{font-family:'Noto Serif KR',serif;font-weight:900;font-size:56px;line-height:1.1;
  background:linear-gradient(180deg,var(--gold-hi) 20%,var(--gold) 55%,var(--gold-dim));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 14px rgba(212,175,55,.35))}
.subtitle{margin-top:16px;color:var(--lavender);font-size:14.5px;line-height:1.65}
.subtitle b{color:var(--text);font-weight:600}
.cta{margin:34px auto 0;display:block;width:min(280px,100%);padding:16px 20px;border-radius:14px;
  font-family:'Noto Serif KR',serif;font-weight:700;font-size:17px;letter-spacing:.08em;color:#2a1747;
  background:linear-gradient(135deg,var(--gold-hi),var(--gold) 55%,#c19a2e);
  border:1px solid rgba(255,244,200,.7);cursor:pointer;
  box-shadow:0 6px 24px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .15s ease, box-shadow .15s ease}
.cta:active{transform:scale(.97);box-shadow:0 3px 12px rgba(212,175,55,.3)}
.intro-foot{margin-top:26px;font-size:11.5px;color:rgba(185,163,227,.55);letter-spacing:.06em}

/* ══ 2. 카드 뽑기 ══ */
/* 뽑은 패(스프레드) */
.spread{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.slot{aspect-ratio:5/7;border-radius:9px;position:relative;cursor:pointer;
  transition:transform .2s ease;border:1.5px solid transparent;
  background:
    linear-gradient(var(--velvet-2),var(--velvet-2)) padding-box,
    linear-gradient(160deg,rgba(212,175,55,.55),rgba(138,109,31,.35)) border-box}
.slot .back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(212,175,55,.5);font-size:17px;
  background:repeating-linear-gradient(45deg,transparent 0 7px,rgba(139,92,246,.08) 7px 14px);border-radius:8px}
.slot.filled{background:
    linear-gradient(160deg,var(--parchment),var(--parchment-2)) padding-box,
    linear-gradient(160deg,var(--gold-hi),var(--gold-dim)) border-box;
  animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.07)}100%{transform:scale(1)}}
.slot.filled .back{display:none}
.slot .face{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:space-between;padding:7px 3px;border-radius:8px;text-align:center}
.slot.filled .face{display:flex}
.slot .face .t{font-size:8.5px;letter-spacing:.06em;color:#8a6d1f;font-weight:700}
.slot .face .ic{font-size:19px}
.slot .face .v{font-size:10px;font-weight:800;color:#3a2b12;line-height:1.15;word-break:keep-all}
.slot.now{transform:translateY(-4px)}
.slot.now::after{content:"▾";position:absolute;left:50%;bottom:-16px;transform:translateX(-50%);
  color:var(--gold);font-size:11px}
.spread-hint{text-align:center;font-size:11px;color:rgba(185,163,227,.6);margin:14px 0 4px}

/* 질문 영역 */
.qwrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0 20px}
.q-eyebrow{font-size:12px;letter-spacing:.3em;color:var(--gold);text-align:center}
.q-title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:23px;text-align:center;margin:10px 0 24px}
.opts{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.opt{width:calc(33.33% - 7px);min-width:96px;max-width:120px;aspect-ratio:5/6.4;border-radius:12px;
  border:1.5px solid transparent;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:
    linear-gradient(165deg,var(--parchment),var(--parchment-2)) padding-box,
    linear-gradient(165deg,rgba(245,215,110,.9),rgba(138,109,31,.7)) border-box;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
  transition:transform .16s ease, box-shadow .16s ease;
  font-family:inherit}
.opt::before,.opt::after{content:"✦";position:absolute;font-size:8px;color:rgba(138,109,31,.55)}
.opt::before{top:5px;left:7px}
.opt::after{bottom:5px;right:7px}
.opt .ic{font-size:29px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15))}
.opt .lb{font-size:13px;font-weight:800;color:#3a2b12;letter-spacing:.02em;word-break:keep-all;
  padding:0 4px;text-align:center;line-height:1.2}
.opt:active{transform:scale(.95)}
.opt.sel{transform:translateY(-5px) scale(1.03);
  box-shadow:0 0 0 2px var(--gold-hi), 0 0 26px rgba(245,215,110,.65), 0 8px 20px rgba(0,0,0,.4)}

/* ══ 3. 로딩(수정구슬) ══ */
#loading{justify-content:center;align-items:center;text-align:center}
.orb-stage{position:relative;width:172px;height:200px;margin-bottom:26px}
.orb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:150px;border-radius:50%;
  background:
    radial-gradient(circle at 33% 28%, rgba(255,255,255,.95) 0 6%, rgba(255,255,255,.28) 16%, transparent 34%),
    radial-gradient(circle at 50% 55%, rgba(185,140,255,.55), rgba(96,52,180,.92) 62%, #23113f 100%);
  box-shadow:0 0 44px rgba(150,90,255,.65), 0 0 100px rgba(139,92,246,.35),
    inset 0 -14px 30px rgba(20,8,45,.75);
  overflow:hidden}
.orb::before{content:"";position:absolute;inset:-45%;
  background:conic-gradient(from 0deg, transparent 0 18%, rgba(255,215,130,.35) 26%, transparent 38%,
    rgba(200,160,255,.4) 55%, transparent 66%, rgba(255,235,180,.28) 82%, transparent 95%);
  animation:swirl 2.6s linear infinite;filter:blur(9px)}
@keyframes swirl{to{transform:rotate(360deg)}}
.orb-base{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:104px;height:30px;
  background:linear-gradient(180deg,#c9a137,#7a5c14);border-radius:8px 8px 16px 16px;
  clip-path:polygon(10% 0,90% 0,100% 100%,0 100%);
  box-shadow:0 6px 16px rgba(0,0,0,.5)}
.spark{position:absolute;color:var(--gold-hi);font-size:15px;animation:tw 1.6s ease-in-out infinite}
#loadmsg{font-family:'Noto Serif KR',serif;font-size:17px;color:var(--lavender);min-height:1.6em}
.dots::after{content:"";animation:dots 1.2s steps(4) infinite}
@keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}

/* ══ 4. 결과 ══ */
#result{gap:0}
.rspread{display:flex;justify-content:center;gap:7px;margin:12px 0 2px}
.rmini{width:58px;aspect-ratio:5/7;border-radius:7px;border:1px solid transparent;
  background:
    linear-gradient(160deg,var(--parchment),var(--parchment-2)) padding-box,
    linear-gradient(160deg,var(--gold-hi),var(--gold-dim)) border-box;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:6px 2px;text-align:center}
.rmini .t{font-size:7.5px;font-weight:700;color:#8a6d1f;letter-spacing:.04em}
.rmini .ic{font-size:16px}
.rmini .v{font-size:8.5px;font-weight:800;color:#3a2b12;line-height:1.1;word-break:keep-all}

.notice{margin:14px 0 0;padding:10px 14px;border-radius:10px;font-size:12.5px;line-height:1.5;
  color:var(--gold-hi);background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.35);text-align:center}

/* 운명의 카드 */
.destiny{margin-top:16px;perspective:900px}
.dcard{border-radius:16px;border:2px solid transparent;position:relative;overflow:hidden;
  background:
    linear-gradient(170deg,var(--parchment),var(--parchment-2)) padding-box,
    linear-gradient(170deg,var(--gold-hi),var(--gold) 45%,var(--gold-dim)) border-box;
  box-shadow:0 10px 34px rgba(0,0,0,.5), 0 0 40px rgba(212,175,55,.22);
  padding:20px 18px 18px;color:#2c2010;
  animation:flipin .7s cubic-bezier(.2,.7,.3,1)}
@keyframes flipin{from{transform:rotateY(90deg);opacity:0}to{transform:none;opacity:1}}
.dcard::before,.dcard::after{content:"✦";position:absolute;color:rgba(138,109,31,.5);font-size:12px}
.dcard::before{top:10px;left:12px}
.dcard::after{bottom:10px;right:12px}
.dbadge{display:inline-block;font-family:'Noto Serif KR',serif;font-size:11.5px;font-weight:700;
  letter-spacing:.28em;color:var(--parchment);background:linear-gradient(135deg,#6d28d9,#4c1d95);
  padding:5px 14px 4px 16px;border-radius:999px;margin-bottom:12px}
.dname{font-family:'Noto Serif KR',serif;font-size:25px;font-weight:900;line-height:1.25;word-break:keep-all}
.dmenu{margin-top:5px;font-size:14px;font-weight:600;color:#6b5320}
.dfortune{margin-top:10px;font-size:12.5px;color:#8a6d1f;font-style:italic}
.dstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:15px;
  border-top:1px solid rgba(138,109,31,.3);padding-top:13px}
.dstat{text-align:center}
.dstat .k{font-size:10px;color:#8a6d1f;letter-spacing:.04em}
.dstat .n{font-size:14.5px;font-weight:800;margin-top:3px}

/* 정렬 + 목록 */
.listhead{display:flex;align-items:baseline;justify-content:space-between;margin:24px 0 10px}
.listhead h3{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--gold-hi);font-weight:700;letter-spacing:.05em}
.listhead .cnt{font-size:12px;color:var(--lavender)}
.sorts{display:flex;gap:7px;margin-bottom:12px}
.sort{flex:1;padding:9px 4px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;
  color:var(--lavender);background:rgba(139,92,246,.1);border:1px solid rgba(185,163,227,.28);
  font-family:inherit;transition:all .18s ease}
.sort.on{color:#2a1747;background:linear-gradient(135deg,var(--gold-hi),var(--gold));
  border-color:rgba(255,244,200,.7);box-shadow:0 3px 12px rgba(212,175,55,.35)}
.rlist{display:flex;flex-direction:column;gap:9px;list-style:none}
.row{border-radius:12px;border:1px solid rgba(212,175,55,.32);position:relative;
  background:linear-gradient(165deg, rgba(42,23,71,.92), rgba(30,16,53,.92));
  padding:13px 14px;animation:rise .4s ease both}
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.row .top{display:flex;align-items:center;gap:9px}
.row .ic{font-size:21px}
.row .nm{flex:1;font-size:15px;font-weight:800;letter-spacing:.01em;word-break:keep-all}
.row .rt{font-size:13.5px;font-weight:800;color:var(--gold-hi)}
.row .mid{margin:5px 0 8px 30px;font-size:12.5px;color:var(--lavender)}
.row .mid b{color:var(--text);font-weight:700}
.row .meta{display:flex;gap:6px;margin-left:30px;flex-wrap:wrap}
.chip{font-size:11px;color:var(--lavender);background:rgba(139,92,246,.13);
  border:1px solid rgba(185,163,227,.2);padding:3px 8px;border-radius:999px}
.rank{position:absolute;top:-7px;left:-5px;width:22px;height:22px;border-radius:50%;
  font-size:11px;font-weight:800;color:#2a1747;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold-hi),var(--gold));box-shadow:0 2px 8px rgba(0,0,0,.4)}
.empty{text-align:center;padding:40px 10px;color:var(--lavender);font-size:14px;line-height:1.7}

.redraw{margin:26px auto 4px;display:block;width:min(240px,100%);padding:13px;border-radius:12px;
  font-family:'Noto Serif KR',serif;font-weight:700;font-size:14.5px;letter-spacing:.1em;cursor:pointer;
  color:var(--gold-hi);background:transparent;border:1.5px solid rgba(212,175,55,.55);
  transition:all .18s ease}
.redraw:active{background:rgba(212,175,55,.12);transform:scale(.97)}
.result-foot{text-align:center;font-size:10.5px;color:rgba(185,163,227,.45);margin-top:16px;letter-spacing:.05em}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
@media (min-width:480px){ .title{font-size:62px} }
</style>
</head>
<body>
<div class="stars" aria-hidden="true">
  <i style="top:6%;left:12%">✦</i><i style="top:11%;left:78%;animation-delay:.7s">✧</i>
  <i style="top:22%;left:32%;animation-delay:1.4s">·</i><i style="top:30%;left:88%;animation-delay:.3s">✦</i>
  <i style="top:47%;left:7%;animation-delay:1.9s">✧</i><i style="top:58%;left:82%;animation-delay:1.1s">·</i>
  <i style="top:70%;left:18%;animation-delay:.5s">✦</i><i style="top:83%;left:64%;animation-delay:1.6s">✧</i>
  <i style="top:91%;left:30%;animation-delay:.9s">·</i><i style="top:38%;left:55%;animation-delay:2.2s">·</i>
</div>

<div class="app">

  <!-- ══ 인트로 ══ -->
  <section class="screen on" id="intro">
    <div class="moon">🔮</div>
    <p class="eyebrow">점심 메뉴가 고민될 땐</p>
    <h1 class="title">점심운세</h1>
    <p class="subtitle">필승상사의 오늘 점심,<br><b>슛돌동 300곳</b>의 운명 속에서 찾아드립니다</p>
    <button class="cta" id="start">운세 보러가기 ✦</button>
    <p class="intro-foot">FORTUNE OF LUNCH · PILSEUNG TRADING CO.</p>
  </section>

  <!-- ══ 카드 뽑기 ══ -->
  <section class="screen" id="draw">
    <p class="eyebrow serif" style="margin-bottom:14px">네 장의 카드를 뽑아주세요</p>
    <div class="spread" id="spread"></div>
    <p class="spread-hint">뽑은 카드를 누르면 다시 고를 수 있어요</p>
    <div class="qwrap">
      <p class="q-eyebrow" id="qeyebrow"></p>
      <h2 class="q-title" id="qtitle"></h2>
      <div class="opts" id="opts"></div>
    </div>
  </section>

  <!-- ══ 로딩 ══ -->
  <section class="screen" id="loading">
    <div class="orb-stage">
      <div class="orb"></div>
      <div class="orb-base"></div>
      <span class="spark" style="top:-4px;left:8px">✦</span>
      <span class="spark" style="top:30px;right:-6px;animation-delay:.5s">✧</span>
      <span class="spark" style="bottom:40px;left:-10px;animation-delay:1s">✦</span>
    </div>
    <p id="loadmsg" class="dots">카드를 섞고 있습니다</p>
  </section>

  <!-- ══ 결과 ══ -->
  <section class="screen" id="result">
    <p class="eyebrow serif">그대의 점심 운세</p>
    <div class="rspread" id="rspread"></div>
    <div id="noticebox"></div>
    <div class="destiny" id="destiny"></div>
    <div class="listhead">
      <h3>운명의 후보들</h3><span class="cnt" id="cnt"></span>
    </div>
    <div class="sorts" id="sorts">
      <button class="sort" data-k="rating">⭐ 평점 높은 순</button>
      <button class="sort" data-k="dist">🚶 거리 가까운 순</button>
      <button class="sort" data-k="wait">⏱ 대기 짧은 순</button>
    </div>
    <ul class="rlist" id="rlist"></ul>
    <button class="redraw" id="redraw">↺ 카드 다시 뽑기</button>
    <p class="result-foot">데이터: 슛돌동 점심식당 300곳 · 필승상사 AI 리터러시 실습</p>
  </section>

</div>

<script>
/* ── 데이터: [카테고리, 음식점명, 대표메뉴, 가격, 최대수용인원, 대기(분), 거리(m), 평점, 목적마스크(혼밥1|친목2|미팅4|회식8)] ── */
const R=[
["분식", "푸른 김밥다이닝", "김밥", 5000, 80, 10, 501, 4.9, 3],

["분식", "오늘 떡볶스토리", "떡볶이", 7000, 24, 10, 1042, 4.8, 3],
["일식", "담백한 초밥포차", "초밥", 17000, 40, 6, 1098, 4.5, 14],
["한식", "온담 불고키친", "불고기", 14500, 40, 3, 261, 5.0, 14],
["한식", "별미 갈비플레이트", "갈비탕", 13000, 80, 13, 689, 4.8, 14],
["베트남", "고운 쌀국식당", "쌀국수", 11000, 40, 24, 765, 5.0, 10],
["한식", "고운 제육랩", "제육볶음", 10000, 20, 5, 1118, 4.4, 3],
["베트남", "풍년 반미면옥", "반미", 8000, 16, 13, 638, 4.1, 3],
["분식", "정성 김밥하우스", "김밥", 6000, 60, 12, 128, 4.4, 3],
["일식", "오월 카레코너", "카레", 12000, 30, 12, 651, 5.0, 6],

  });
}

/* ── 질문 렌더 ── */
function renderStep(){
  const q=Q[curStep];
  renderSpread();
  $('#qeyebrow').textContent=q.ord+' · '+q.slot;
  $('#qtitle').textContent=q.title;
  const box=$('#opts');box.innerHTML='';
  q.opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'+(picked[q.key]&&picked[q.key].label===o.label?' sel':'');
    b.innerHTML=`<span class="ic">${o.icon}</span><span class="lb">${o.label}</span>`;
    b.onclick=()=>{
      picked[q.key]=o; state[q.key]=o.v;
      b.classList.add('sel'); renderSpread();
      setTimeout(()=>{
        const next=Q.findIndex(x=>!picked[x.key]);
        if(next===-1){ startLoading(); }
        else{ curStep=next; renderStep(); }
      },380);
    };
    box.appendChild(b);
  });
}

/* ── 필터 + 단계적 완화 ── */
function filter(){
  const [lo,hi]=PRICEBIN[state.price];
  const base=r=>r[0]===state.cat;
  const cap=r=>r[4]>=state.party;
  const pur=r=>(r[8]&state.purpose)!==0;
  const prc=r=>r[3]>=lo&&r[3]<hi;
  let list=R.filter(r=>base(r)&&cap(r)&&pur(r)&&prc(r));
  if(list.length) return {list,relax:null};
  list=R.filter(r=>base(r)&&cap(r)&&pur(r));
  if(list.length) return {list,relax:'가격대'};
  list=R.filter(r=>base(r)&&pur(r));
  if(list.length) return {list,relax:'가격대·인원'};
  list=R.filter(r=>base(r)&&cap(r)&&prc(r));
  if(list.length) return {list,relax:'목적'};
  list=R.filter(r=>base(r));
  return {list,relax:list.length?'가격대·인원·목적':'none'};
}
const SORTS={
  rating:(a,b)=>b[7]-a[7]||a[6]-b[6],
  dist:(a,b)=>a[6]-b[6]||b[7]-a[7],
  wait:(a,b)=>a[5]-b[5]||b[7]-a[7]
};

/* ── 로딩 → 결과 ── */
function startLoading(){
  show('#loading');
  const msgs=['카드를 섞고 있습니다','수정구슬이 답을 찾는 중','운명이 모습을 드러냅니다'];
  let i=0; $('#loadmsg').textContent=msgs[0];
  const t=setInterval(()=>{i++; if(i<msgs.length) $('#loadmsg').textContent=msgs[i];},800);
  setTimeout(()=>{clearInterval(t); buildResult(); show('#result');},2300);
}

function buildResult(){
  const {list,relax}=filter();
  relaxNote=relax;
  sortKey = state.purpose===1 ? 'wait' : 'rating';   // 혼밥이면 대기 짧은 순이 기본
  results=[...list];
  destinyRow = [...list].sort(SORTS[sortKey])[0]||null;
  /* 미니 스프레드 */
  const rs=$('#rspread');rs.innerHTML='';
  Q.forEach(q=>{const o=picked[q.key];
    rs.innerHTML+=`<div class="rmini"><span class="t">${q.slot}</span><span class="ic">${o.icon}</span><span class="v">${o.label}</span></div>`});
  /* 완화 안내 */
  $('#noticebox').innerHTML = relax&&relax!=='none'
    ? `<div class="notice">✦ 조건에 꼭 맞는 곳이 없어 <b>${relax}</b> 조건을 완화해 운명을 넓혔습니다</div>` : '';
  renderDestiny(); renderList();
}

function renderDestiny(){
  const d=$('#destiny');
  if(!destinyRow){d.innerHTML='';return}
  const r=destinyRow;
  d.innerHTML=`<div class="dcard">
    <span class="dbadge">오늘의 운명</span>
    <div class="dname">${CATICON[r[0]]||''} ${r[1]}</div>
    <div class="dmenu">${r[2]} · ${r[3].toLocaleString()}원</div>
    <div class="dfortune">“${FORTUNE[state.purpose]||''}”</div>
    <div class="dstats">
      <div class="dstat"><div class="k">평점</div><div class="n">★ ${r[7].toFixed(1)}</div></div>
      <div class="dstat"><div class="k">거리</div><div class="n">${r[6]}m</div></div>
      <div class="dstat"><div class="k">대기</div><div class="n">${r[5]}분</div></div>
      <div class="dstat"><div class="k">수용</div><div class="n">${r[4]}명</div></div>
    </div></div>`;
}

function renderList(){
  document.querySelectorAll('.sort').forEach(b=>b.classList.toggle('on',b.dataset.k===sortKey));
  const sorted=[...results].sort(SORTS[sortKey]);
  $('#cnt').textContent=`운명이 고른 ${sorted.length}곳`;
  const ul=$('#rlist');ul.innerHTML='';
  if(!sorted.length){ul.innerHTML='<li class="empty">오늘은 운명이 침묵하네요.<br>카드를 다시 뽑아보세요 ↺</li>';return}
  sorted.forEach((r,i)=>{
    const li=document.createElement('li');
    li.className='row';li.style.animationDelay=(Math.min(i,10)*.05)+'s';
    li.innerHTML=`<span class="rank">${i+1}</span>
      <div class="top"><span class="ic">${CATICON[r[0]]||'🍽'}</span>
        <span class="nm">${r[1]}</span><span class="rt">★ ${r[7].toFixed(1)}</span></div>
      <div class="mid"><b>${r[2]}</b> · ${r[3].toLocaleString()}원</div>
      <div class="meta"><span class="chip">🚶 ${r[6]}m</span>
        <span class="chip">⏱ 대기 ${r[5]}분</span>
        <span class="chip">👥 최대 ${r[4]}명</span></div>`;
    ul.appendChild(li);
  });
}

/* ── 이벤트 ── */
$('#start').onclick=()=>{show('#draw');renderStep()};
$('#sorts').onclick=e=>{const b=e.target.closest('.sort');if(!b)return;sortKey=b.dataset.k;renderList()};
$('#redraw').onclick=()=>{state={cat:null,party:null,purpose:null,price:null};picked={};curStep=0;show('#draw');renderStep()};
</script>
</body>
</html>
