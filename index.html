<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실전 맛집 랭킹 (더미데이터 300건)</title>
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
    h1 { text-align: center; color: #1a1a1a; font-size: 22px; margin-bottom: 25px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #4a4a4a; }
    select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; background-color: #f8fafc; appearance: none; }
    button { width: 100%; padding: 14px; background-color: #ff5a5f; color: #ffffff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    button:active { background-color: #e0484d; }
    
    .sort-group { display: flex; justify-content: flex-end; margin-top: 15px; align-items: center; gap: 10px; }
    .sort-group select { width: auto; padding: 6px 10px; font-size: 13px; }
    
    .result-list { margin-top: 15px; list-style: none; padding: 0; }
    .restaurant-card { border: 1px solid #edf2f7; border-radius: 12px; padding: 16px; margin-bottom: 12px; background: #ffffff; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.1s; }
    .restaurant-card:active { transform: scale(0.98); background-color: #fcfcfc; }
    
    .rank-badge { position: absolute; top: 0; left: 0; background-color: #ff5a5f; color: white; font-weight: bold; padding: 4px 10px; border-bottom-right-radius: 12px; font-size: 14px; }
    
    .restaurant-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 12px; margin-bottom: 8px; }
    .restaurant-name { font-size: 18px; font-weight: bold; color: #2d3748; }
    .restaurant-rating { color: #f6ad55; font-weight: bold; font-size: 16px; }
    
    .restaurant-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; color: #718096; margin-bottom: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; }
    .info-item { display: flex; align-items: center; gap: 4px; }
    
    .restaurant-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: #edf2f7; color: #4a5568; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .tag.purpose { background: #ebf8ff; color: #3182ce; }
    
    .empty-state { text-align: center; color: #a0aec0; padding: 30px; font-size: 15px; }
</style>
</head>
<body>

<div class="container">
    <h1>👑 실전 맛집 랭킹</h1>
    
    <div class="form-group">
        <label>어떤 음식을 드시고 싶나요?</label>
        <select id="category">
            <option value="all">전체 메뉴</option>
            <option value="한식">한식</option>
            <option value="양식">양식</option>
            <option value="중식">중식</option>
            <option value="일식">일식</option>
            <option value="분식">분식</option>
            <option value="패스트푸드">패스트푸드</option>
            <option value="샐러드">샐러드</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>몇 분이서 가시나요?</label>
        <select id="people">
            <option value="all">상관없음 (전체)</option>
            <option value="1">1명 (혼밥)</option>
            <option value="2">2명</option>
            <option value="3">3~4명</option>
            <option value="5">5명 이상</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>방문 목적이 무엇인가요?</label>
        <select id="purpose">
            <option value="all">상관없음</option>
            <option value="데이트">데이트</option>
            <option value="가족식사">가족식사</option>
            <option value="회식">회식</option>
            <option value="빠른식사">빠른식사</option>
        </select>
    </div>
    
    <button onclick="recommend()">랭킹 보기</button>

    <div class="sort-group">
        <label>정렬기준:</label>
        <select id="sortBy" onchange="recommend()">
            <option value="rating">만족도 높은순</option>
            <option value="distance">거리 가까운순</option>
            <option value="price">가격 낮은순</option>
            <option value="time">식사시간 짧은순</option>
        </select>
    </div>

    <ul class="result-list" id="resultArea"></ul>
</div>

    function recommend() {
        const category = document.getElementById("category").value;
        const peopleStr = document.getElementById("people").value;
        const purpose = document.getElementById("purpose").value;
        const sortBy = document.getElementById("sortBy").value;

        // 필터링 적용
        let filtered = dbData.filter(r => {
            // 1. 메뉴 필터
            if (category !== "all" && r.category !== category) return false;
            
            // 2. 인원 필터
            if (peopleStr !== "all") {
                const p = parseInt(peopleStr);
                if (p === 1 && r.people !== 1) return false;
                if (p === 2 && r.people !== 2) return false;
                if (p === 3 && (r.people < 3 || r.people > 4)) return false;
                if (p === 5 && r.people < 5) return false;
            }

            // 3. 목적 필터
            if (purpose !== "all" && !r.purpose.includes(purpose)) return false;

            return true;
        });

        // 정렬 적용
        filtered.sort((a, b) => {
            if (sortBy === "rating") return b.rating - a.rating; // 높은순
            if (sortBy === "distance") return a.distance - b.distance; // 낮은순
            if (sortBy === "price") return a.price - b.price; // 낮은순
            if (sortBy === "time") return a.time - b.time; // 낮은순
        });

        displayResults(filtered);
    }

    function displayResults(data) {
        const resultArea = document.getElementById("resultArea");
        resultArea.innerHTML = "";

        // 검색 결과 개수 표시 (상단에 살짝 추가)
        if (data.length === 0) {
            resultArea.innerHTML = "<div class='empty-state'>조건에 맞는 맛집이 없습니다.<br>필터를 조금 완화해 보세요!</div>";
            return;
        }

        // 최대 30개까지만 렌더링 (모바일 최적화)
        const displayData = data.slice(0, 30);

        displayData.forEach((r, index) => {
            const li = document.createElement("li");
            li.className = "restaurant-card";
            // 💡 카드를 클릭하면 네이버 지도로 검색하도록 추가!
            li.onclick = () => {
                window.open(`https://map.naver.com/v5/search/${encodeURIComponent(r.name)}`, '_blank');
            };
            
            // 순위 뱃지 (1~3위는 특별한 색상)
            let rankColor = "#ff5a5f";
            if(index === 0) rankColor = "#FFD700"; // 1위 금
            else if(index === 1) rankColor = "#C0C0C0"; // 2위 은
            else if(index === 2) rankColor = "#CD7F32"; // 3위 동
            else rankColor = "#718096"; // 그 외

            li.innerHTML = `
                <div class="rank-badge" style="background-color: ${rankColor}">${index + 1}위</div>
                <div class="restaurant-header">
                    <div class="restaurant-name">${r.name}</div>
                    <div class="restaurant-rating">★ ${r.rating.toFixed(1)}</div>
                </div>
                
                <div class="restaurant-info">
                    <div class="info-item">💸 ${r.price.toLocaleString()}원</div>
                    <div class="info-item">🚶 회사서 ${r.distance}m</div>
                    <div class="info-item">⏳ 식사 ${r.time}분</div>
                    <div class="info-item">👥 ${r.people}인 기준</div>
                </div>

                <div class="restaurant-tags">
                    <span class="tag">${r.category}</span>
                    ${r.purpose.map(p => `<span class="tag purpose">#${p}</span>`).join('')}
                    <span class="tag">🔥 맵기${r.spicy}</span>
                    <span class="tag">🌿 ${r.cal}kcal</span>
                </div>
            `;
            resultArea.appendChild(li);
        });
    }

    // 초기 화면 로드 시 바로 전체 랭킹 보여주기
    window.onload = () => recommend();
</script>
